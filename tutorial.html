
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Art Tutorials</title>
    <link rel="stylesheet" href="tutorial_styles.css">
    <!-- Using Google Fonts for a modern, sleek typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Using Phosphor Icons for a clean, modern icon set -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="top-nav glass-panel">
            <div class="nav-links">
                <a href="index.html" class="nav-item"><i class="ph ph-house"></i> Home</a>
                <a href="commissions.html" class="nav-item"><i class="ph ph-palette"></i> Commissions</a>
                <a href="connect.html" class="nav-item"><i class="ph ph-users"></i> Sign up / Log In</a>
                <a href="settings.html" class="nav-item"><i class="ph ph-gear"></i> Settings</a>
            </div>
            
            <div class="profile-section">
                <!-- Notifications/Alerts Bell -->
                <button class="icon-btn" aria-label="Notifications">
                    <i class="ph ph-bell"></i>
                    <span class="notification-dot"></span>
                </button>
                <div class="profile-avatar">
                    <img src="https://ui-avatars.com/api/?name=Artist&background=2563eb&color=fff" alt="Profile avatar">
                </div>
            </div>
        </header>

        <div class="content-wrapper">
            <!-- Left Vertical Sidebar -->
            <aside class="sidebar glass-panel" id="sidebar">
                <button class="toggle-btn" id="toggle-sidebar" aria-label="Toggle Navigation">
                    <i class="ph ph-caret-left"></i>
                </button>
                <nav class="side-nav">
                    <div class="nav-group-title">Commissions & Tutorials</div>
                    <div class="side-nav-item-container">
                        <a href="index.html" class="side-nav-item active"><i class="ph ph-monitor"></i> <span class="nav-text">Digital Art</span></a>
                        <div class="submenu">
                            <a href="tutorial.html" class="submenu-item active"><i class="ph ph-book-open"></i> <span class="nav-text">Tutorial</span></a>
                            <a href="commissions.html" class="submenu-item"><i class="ph ph-shopping-cart"></i> <span class="nav-text">Commissions</span></a>
                        </div>
                    </div>
                    <a href="pottery_page.html" class="side-nav-item"><i class="ph ph-coffee"></i> <span class="nav-text">Pottery</span></a>
                    <a href="jewlery_page.html" class="side-nav-item"><i class="ph ph-diamond"></i> <span class="nav-text">Jewelry</span></a>
                    <a href="music_page_frontend.html" class="side-nav-item"><i class="ph ph-music-notes"></i> <span class="nav-text">Music</span></a>
                    <a href="crochet_page.html" class="side-nav-item"><i class="ph ph-yarn"></i> <span class="nav-text">Crochet</span></a>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <div class="content-card glass-panel">
                    <div class="tutorial-grid">
                    </div>

                    <!-- Video Popup Modal -->
                    <div id="video-modal" class="modal-overlay hidden">
                        <div class="modal-content">
                            <button id="modal-close" class="modal-close" aria-label="Close modal">×</button>
                            <div class="modal-body">
                                <div class="modal-video-panel">
                                    <div class="modal-video-title">SketchMaster's Tutorial</div>
                                    <iframe id="modal-video-iframe" src="" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
                                </div>
                                <aside class="modal-comments-panel">
                                    <h3>Comments</h3>
                                    <form id="popup-comment-form" class="comment-form">
                                        <input type="text" id="popup-commenter-name" placeholder="Your name" required>
                                        <textarea id="popup-comment-text" rows="4" placeholder="Write your comment..." required></textarea>
                                        <button type="submit">Post Comment</button>
                                    </form>
                                    <div id="popup-comments-list" class="comments-list">
                                        <div class="comment-item"><strong>AliceSketcher</strong>: Amazing tutorial, thanks for sharing!</div>
                                        <div class="comment-item"><strong>SketchingBruh</strong>: Great pacing and visuals. Learned a lot.</div>
                                    </div>
                                </aside>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="themer.js"></script>
    <script src="script.js"></script>
</body>

</html>
