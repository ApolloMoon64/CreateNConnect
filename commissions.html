<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Homepage</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts and Phosphor Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Using Phosphor Icons for a clean, modern icon set -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="app-container">
        <!-- Top Navigation Bar -->
        <header class="top-nav glass-panel">
            <div class="nav-links">
                <a href="index.html" class="nav-item"><i class="ph ph-house"></i> Home</a>
                <a href="commissions.html" class="nav-item active"><i class="ph ph-palette"></i> Commissions</a>
                <a href="connect.html" class="nav-item"><i class="ph ph-users"></i> Connect</a>
                <a href="auth.html" class="nav-item"><i class="ph ph-user"></i> Sign up / Log In</a>
                <a href="settings.html" class="nav-item"><i class="ph ph-gear"></i> Settings</a>
            </div>

            <div class="profile-section">
                <!-- Notification Alert/Bell -->
                <button class="icon-btn" aria-label="Notifications">
                    <i class="ph ph-bell"></i>
                    <span class="notification-dot"></span>
                </button>
                <a class="profile-avatar" href="profile.html" aria-label="Open artist profile">
                    <img src="https://ui-avatars.com/api/?name=Artist&background=2563eb&color=fff" alt="Profile avatar">
                </a>
            </div>
        </header>

        <div class="content-wrapper">
            <!-- Left Vertical Sidebar -->
            <aside class="sidebar glass-panel" id="sidebar">
                <button class="toggle-btn" id="toggle-sidebar" aria-label="Toggle Navigation">
                    <i class="ph ph-caret-left"></i>
                </button>

                <nav class="side-nav">
                    <div class="nav-group-title">Commissions & Tutorials</div>

                    <a href="#" class="side-nav-item active has-submenu" onclick="showCategory('digital', this); return false;">
                        <i class="ph ph-monitor"></i>
                        <span class="nav-text">Digital Art</span>
                    </a>

                    <div class="submenu expanded">
                        <div class="submenu-inner">
                            <a href="tutorial.html" class="submenu-item">Tutorials</a>
                            <a href="commissions.html" class="submenu-item" style="color: var(--accent-color);">Comm.</a>
                        </div>
                    </div>

                    <a href="#" class="side-nav-item" onclick="showCategory('pottery', this); return false;">
                        <i class="ph ph-coffee"></i>
                        <span class="nav-text">Pottery</span>
                    </a>

                    <a href="#" class="side-nav-item" onclick="showCategory('jewelry', this); return false;">
                        <i class="ph ph-diamond"></i>
                        <span class="nav-text">Jewelry</span>
                    </a>

                    <a href="#" class="side-nav-item" onclick="showCategory('music', this); return false;">
                        <i class="ph ph-music-notes"></i>
                        <span class="nav-text">Music</span>
                    </a>

                    <a href="#" class="side-nav-item" onclick="showCategory('crochet', this); return false;">
                        <i class="ph ph-yarn"></i>
                        <span class="nav-text">Crochet</span>
                    </a>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <div class="content-card glass-panel">
                    <p id="commission-message" class="commission-message"></p>
                    <section id="commission-form-panel" class="commission-form-panel glass-panel-lite is-hidden" aria-hidden="true">
                        <div class="commission-form-header">
                            <div>
                                <p class="content-card-kicker">New Commission</p>
                                <h2 class="commission-form-title" id="commission-form-title">Add Digital Art</h2>
                            </div>
                            <div class="commission-form-header-actions">
                                <span class="commission-form-category" id="commission-form-category-badge">digital</span>
                                <button class="btn btn-secondary" type="button" id="commission-form-close">Close</button>
                            </div>
                        </div>

                        <form id="commission-form" class="commission-form">
                            <input type="hidden" id="commission-category" value="digital">

                            <label class="commission-form-field">
                                <span>Title</span>
                                <input id="commission-title" class="auth-input" type="text" placeholder="Character portrait commission" required>
                            </label>

                            <label class="commission-form-field">
                                <span>Artist Name</span>
                                <input id="commission-artist" class="auth-input" type="text" placeholder="Your artist name" required>
                            </label>

                            <label class="commission-form-field">
                                <span>Price</span>
                                <input id="commission-price" class="auth-input" type="number" min="0" step="0.01" placeholder="75" required>
                            </label>

                            <label class="commission-form-field commission-form-span">
                                <span>Description</span>
                                <textarea id="commission-description" class="auth-input profile-content-textarea" placeholder="Describe what buyers receive, style options, timeline, or request details." required></textarea>
                            </label>

                            <div class="commission-form-field">
                                <span>Artwork Image</span>
                                <label class="commission-upload-card" for="commission-image-input">
                                    <input id="commission-image-input" type="file" accept="image/*" hidden>
                                    <img id="commission-image-preview" class="commission-upload-preview" alt="Commission artwork preview" hidden>
                                    <div id="commission-upload-empty" class="commission-upload-empty">
                                        <span class="add-post-icon"><i class="ph ph-image-square"></i></span>
                                        <span class="add-post-title">Choose artwork from your device</span>
                                        <span class="add-post-copy">Select the actual piece you want clients to see for this commission.</span>
                                    </div>
                                </label>
                            </div>

                            <div class="commission-form-actions">
                                <button class="btn btn-primary" type="submit">Save Commission</button>
                                <button class="btn btn-secondary" type="button" id="commission-form-reset">Clear</button>
                            </div>
                        </form>
                    </section>

                    <div id="digital" class="category-section active">
                        <h1 class="page-title">Digital Art Commissions</h1>
                        <button class="btn btn-primary" type="button" data-add-commission="digital">+ Add Digital Art</button>
                        <div class="commission-grid" id="digital-grid"></div>
                    </div>

                    <div id="pottery" class="category-section">
                        <h1 class="page-title">Pottery Commissions</h1>
                        <button class="btn btn-primary" type="button" data-add-commission="pottery">+ Add Pottery</button>
                        <div class="commission-grid" id="pottery-grid"></div>
                    </div>

                    <div id="jewelry" class="category-section">
                        <h1 class="page-title">Jewelry Commissions</h1>
                        <button class="btn btn-primary" type="button" data-add-commission="jewelry">+ Add Jewelry</button>
                        <div class="commission-grid" id="jewelry-grid"></div>
                    </div>

                    <div id="music" class="category-section">
                        <h1 class="page-title">Music Commissions</h1>
                        <button class="btn btn-primary" type="button" data-add-commission="music">+ Add Music</button>
                        <div class="commission-grid" id="music-grid"></div>
                    </div>

                    <div id="crochet" class="category-section">
                        <h1 class="page-title">Crochet Commissions</h1>
                        <button class="btn btn-primary" type="button" data-add-commission="crochet">+ Add Crochet</button>
                        <div class="commission-grid" id="crochet-grid"></div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="commissions.js"></script>
    <script src="themer.js"></script>
</body>

</html>
