<!DOCTYPE html>
<html data-theme="light" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="app-container">
        <header class="top-nav glass-panel">
            <div class="nav-links">
                <a href="index.html" class="nav-item"><i class="ph ph-house"></i> Home</a>
                <a href="commissions.html" class="nav-item"><i class="ph ph-palette"></i> Commissions</a>
                <a href="connect.html" class="nav-item"><i class="ph ph-users"></i> Connect</a>
                <a href="auth.html" class="nav-item"><i class="ph ph-user"></i> Sign up / Log In</a>
                <a href="settings.html" class="nav-item"><i class="ph ph-gear"></i> Settings</a>
            </div>
        </header>

        <main class="auth-shell">
            <section class="auth-panel glass-panel">
                <h1 class="page-title">Reset Password</h1>
                <p id="reset-password-message" class="auth-message" aria-live="polite"></p>
                <form id="reset-password-form" class="auth-form active">
                    <label class="auth-label" for="reset-password">New Password</label>
                    <input id="reset-password" class="auth-input" type="password" placeholder="Create a new password" minlength="8" required>

                    <label class="auth-label" for="reset-password-confirm">Confirm Password</label>
                    <input id="reset-password-confirm" class="auth-input" type="password" placeholder="Repeat new password" minlength="8" required>

                    <button class="btn btn-primary auth-submit" type="submit">Update Password</button>
                </form>
            </section>
        </main>
    </div>

    <script src="theme.js"></script>
    <script src="script.js"></script>
    <script src="reset-password.js"></script>
</body>

</html>
